    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Montserrat', sans-serif;
        background: linear-gradient(135deg, #233877 0%, #9F8EC2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;

      .container {
        text-align: center;
        max-width: 560px;
      }
      .logo {

        margin: 0 auto 40px;

      }

        font-size: 48px;

      p {
        font-size: 17px;
        color: rgba(255,255,255,0.75);

        margin-bottom: 40px;
      }
      .divider {
        width: 44px;
        height: 4px;
        border-radius: 2px;
        background: rgba(255,255,255,0.40);
        margin: 0 auto 32px;
      }
      .contact {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 100px;
        padding: 12px 24px;
        color: rgba(255,255,255,0.85);
        font-size: 14px;
        text-decoration: none;
        transition: background 0.2s ease;
      }
      .contact:hover { background: rgba(255,255,255,0.20); }
      @media (max-width: 480px) {
        h1 { font-size: 32px; }
        p { font-size: 15px; }
